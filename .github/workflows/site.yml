name: site

on:
  push:
    branches: [main]
    paths:
      - "data/reels/**"
      - "data/sent/**"
      - "site/**"
      - "src/build_site.py"
      - ".github/workflows/site.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Pagefind
        run: npm install -g pagefind

      - name: Build site
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUBSCRIBE_FORM_URL: ${{ secrets.SUBSCRIBE_FORM_URL }}
          SUBSCRIBE_FORM_EMAIL_ENTRY: ${{ secrets.SUBSCRIBE_FORM_EMAIL_ENTRY }}
        run: python src/build_site.py

      - name: Persist theme cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/themes.json
          if ! git diff --quiet --cached; then
            git commit -m "Update weekly theme cache [skip ci]"
            git push
          fi

      - name: Generate Pagefind index
        run: pagefind --site site/_dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/_dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
