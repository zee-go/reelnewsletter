{% extends "base.html" %}
{% block title %}Search · Zee Weekly{% endblock %}

{% block content %}
<p class="page-date">Full-text</p>
<h1 class="page-h1">Search</h1>
<p class="intro">Search every post's title, summary, key points, and transcript.</p>

<div style="margin: 32px 0 40px;">
  <div id="search"></div>
</div>

<script>
  window.addEventListener('DOMContentLoaded', () => {
    if (window.PagefindUI) {
      new PagefindUI({
        element: '#search',
        showSubResults: true,
        showImages: false,
        resetStyles: false,
      });
    } else {
      document.getElementById('search').innerHTML =
        '<p style="color:var(--ink-dim); font-family:var(--font-mono); font-size:12px; letter-spacing:0.08em; text-transform:uppercase;">Search index not built yet. Come back after the next deploy.</p>';
    }
  });
</script>
{% endblock %}
